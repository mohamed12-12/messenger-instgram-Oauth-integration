<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Comments - Nanovate</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #E1306C;
            --bg: #F0F2F5;
            --sidebar: #1C1E21;
            --text: #111827;
            --muted: #6B7280;
            --border: #E5E7EB;
            --card: #FFFFFF;
            --danger: #DC2626;
            --success: #059669;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            display: flex;
            min-height: 100vh;
            color: var(--text);
        }

        .sidebar {
            width: 280px;
            background: var(--sidebar);
            color: white;
            padding: 40px 24px;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            color: #0052ff;
            margin-bottom: 60px;
        }

        .nav-item {
            padding: 16px;
            border-radius: 12px;
            color: #8c96a3;
            text-decoration: none;
            margin-bottom: 8px;
            display: block;
        }

        .nav-item.active {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .main {
            flex: 1;
            padding: 40px;
            max-width: 1320px;
            width: 100%;
            margin: 0 auto;
        }

        .topbar,
        .error-box,
        .comments-shell {
            background: var(--card);
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            border: 1px solid #F3F4F6;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            padding: 24px 28px;
            margin-bottom: 20px;
        }

        .account-meta h1 {
            font-size: 28px;
            margin-bottom: 6px;
        }

        .account-meta p {
            color: var(--muted);
            font-size: 14px;
        }

        .status-pill {
            background: #D1FAE5;
            color: #065F46;
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 700;
            white-space: nowrap;
        }

        .error-box {
            background: #FEF2F2;
            color: #991B1B;
            border-color: #FECACA;
            padding: 18px 20px;
            margin-bottom: 20px;
        }

        .comments-shell {
            padding: 24px;
        }

        .comments-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .comments-head h2 {
            font-size: 20px;
        }

        .comments-head button {
            background: #111827;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 10px 14px;
            cursor: pointer;
            font-weight: 600;
        }

        .comments-list {
            display: grid;
            gap: 16px;
        }

        .comment-card {
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px;
            display: grid;
            grid-template-columns: 88px 1fr;
            gap: 16px;
            background: #FCFCFD;
        }

        .media-preview {
            width: 88px;
            height: 88px;
            border-radius: 12px;
            overflow: hidden;
            background: #E5E7EB;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4B5563;
            font-size: 12px;
            text-align: center;
            padding: 8px;
            word-break: break-word;
        }

        .media-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .comment-meta {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .comment-meta strong {
            font-size: 15px;
        }

        .comment-meta span,
        .media-id {
            color: var(--muted);
            font-size: 13px;
        }

        .comment-text {
            line-height: 1.5;
            margin-bottom: 12px;
            white-space: pre-wrap;
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 10px;
            align-items: center;
        }

        .actions input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font: inherit;
        }

        .btn {
            border: none;
            border-radius: 10px;
            padding: 12px 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-reply {
            background: var(--primary);
            color: white;
        }

        .btn-hide {
            background: #FEE2E2;
            color: var(--danger);
        }

        .card-status {
            margin-top: 10px;
            font-size: 13px;
            color: var(--muted);
        }

        .state-box {
            text-align: center;
            padding: 48px 20px;
            color: var(--muted);
            border: 1px dashed var(--border);
            border-radius: 14px;
            background: #FAFAFA;
        }

        @media (max-width: 900px) {
            body {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                padding: 24px 20px 12px;
            }

            .main {
                padding: 20px;
            }

            .comment-card {
                grid-template-columns: 1fr;
            }

            .media-preview {
                width: 100%;
                height: 180px;
            }

            .actions {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">nanovate.io</div>
        <nav>
            <a href="/" class="nav-item">Facebook Messenger</a>
            <a href="/instagram/dashboard/{{ account_id }}" class="nav-item">Instagram Messaging</a>
            <a href="/instagram/comments/{{ account_id }}" class="nav-item active">Instagram Comments</a>
        </nav>
    </div>

    <div class="main">
        <div class="topbar">
            <div class="account-meta">
                <h1>Instagram Comments</h1>
                <p>@{{ username }} · Account ID: <code>{{ account_id }}</code></p>
            </div>
            <div class="status-pill">Comment Management</div>
        </div>

        {% if token_error %}
        <div class="error-box">{{ token_error }}</div>
        {% endif %}

        <div class="comments-shell">
            <div class="comments-head">
                <h2>Comments Inbox</h2>
                <button type="button" onclick="fetchComments()">Refresh</button>
            </div>
            <div id="commentsList" class="comments-list">
                <div class="state-box">Loading Instagram comments...</div>
            </div>
        </div>
    </div>

    <script>
        const connectedInstagramId = {{ account_id|tojson }};

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatTimestamp(value) {
            if (!value) {
                return 'Unknown time';
            }
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) {
                return escapeHtml(value);
            }
            return date.toLocaleString();
        }

        function renderComments(comments) {
            const container = document.getElementById('commentsList');
            if (!comments.length) {
                container.innerHTML = '<div class="state-box">No comments found for this Instagram account.</div>';
                return;
            }

            container.innerHTML = comments
                .filter(comment => !comment.hidden)
                .map(comment => {
                    const previewUrl = comment.thumbnail_url || comment.media_url || '';
                    const previewHtml = previewUrl
                        ? `<img src="${escapeHtml(previewUrl)}" alt="Instagram media preview">`
                        : `<div>Media ID<br>${escapeHtml(comment.media_id)}</div>`;

                    return `
                        <div class="comment-card" id="comment-card-${escapeHtml(comment.comment_id)}">
                            <div class="media-preview">${previewHtml}</div>
                            <div>
                                <div class="comment-meta">
                                    <strong>@${escapeHtml(comment.username)}</strong>
                                    <span>${formatTimestamp(comment.timestamp)}</span>
                                </div>
                                <div class="media-id">Media/Post ID: ${escapeHtml(comment.media_id)}</div>
                                <div class="comment-text">${escapeHtml(comment.comment_text)}</div>
                                <div class="actions">
                                    <input
                                        type="text"
                                        id="reply-input-${escapeHtml(comment.comment_id)}"
                                        placeholder="Write a public reply..."
                                    >
                                    <button class="btn btn-reply" type="button" onclick="replyToComment('${escapeHtml(comment.comment_id)}')">Reply</button>
                                    <button class="btn btn-hide" type="button" onclick="hideComment('${escapeHtml(comment.comment_id)}')">Hide</button>
                                </div>
                                <div class="card-status" id="status-${escapeHtml(comment.comment_id)}"></div>
                            </div>
                        </div>
                    `;
                })
                .join('');

            if (!container.innerHTML.trim()) {
                container.innerHTML = '<div class="state-box">All fetched comments are already hidden.</div>';
            }
        }

        async function fetchComments() {
            const container = document.getElementById('commentsList');
            container.innerHTML = '<div class="state-box">Refreshing comments...</div>';

            try {
                const response = await fetch(`/api/instagram/comments?ig_account_id=${encodeURIComponent(connectedInstagramId)}`);
                const data = await response.json();

                if (!response.ok || !data.success) {
                    container.innerHTML = `<div class="state-box">${escapeHtml(data.error || 'Failed to load comments.')}</div>`;
                    return;
                }

                renderComments(data.comments || []);
            } catch (error) {
                container.innerHTML = '<div class="state-box">Network error while loading comments.</div>';
            }
        }

        async function replyToComment(commentId) {
            const input = document.getElementById(`reply-input-${commentId}`);
            const status = document.getElementById(`status-${commentId}`);
            const message = (input.value || '').trim();

            if (!message) {
                status.textContent = 'Reply text is required.';
                status.style.color = '#DC2626';
                return;
            }

            status.textContent = 'Sending reply...';
            status.style.color = '#6B7280';

            try {
                const response = await fetch('/api/instagram/reply-comment', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        ig_account_id: connectedInstagramId,
                        comment_id: commentId,
                        message: message
                    })
                });
                const data = await response.json();

                if (!response.ok || !data.success) {
                    status.textContent = data.error || 'Reply failed.';
                    status.style.color = '#DC2626';
                    return;
                }

                input.value = '';
                status.textContent = 'Reply sent successfully.';
                status.style.color = '#059669';
            } catch (error) {
                status.textContent = 'Network error while replying.';
                status.style.color = '#DC2626';
            }
        }

        async function hideComment(commentId) {
            const status = document.getElementById(`status-${commentId}`);
            status.textContent = 'Hiding comment...';
            status.style.color = '#6B7280';

            try {
                const response = await fetch('/api/instagram/hide-comment', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        ig_account_id: connectedInstagramId,
                        comment_id: commentId
                    })
                });
                const data = await response.json();

                if (!response.ok || !data.success) {
                    status.textContent = data.error || 'Hide failed.';
                    status.style.color = '#DC2626';
                    return;
                }

                const card = document.getElementById(`comment-card-${commentId}`);
                if (card) {
                    card.remove();
                }
            } catch (error) {
                status.textContent = 'Network error while hiding comment.';
                status.style.color = '#DC2626';
            }
        }

        fetchComments();
    </script>
</body>
</html>
