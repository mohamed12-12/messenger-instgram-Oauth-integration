<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Nanovate</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #6D68D0;
            --text-main: #111827;
            --text-sub: #6B7280;
            --primary: #1877F2;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            min-height: 100vh;
            padding: 40px;
        }

        .navbar {
            max-width: 1200px;
            margin: 0 auto 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .page-badge {
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 360px;
            gap: 40px;
        }

        @media (max-width: 900px) {
            main {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 48px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        h2 {
            font-size: 24px;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .desc {
            color: var(--text-sub);
            margin-bottom: 32px;
            font-size: 16px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        input,
        textarea {
            width: 100%;
            padding: 16px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus,
        textarea:focus {
            border-color: var(--primary);
        }

        .btn-send {
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px 32px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .btn-send:hover {
            background: #166fe5;
            transform: translateY(-1px);
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .activity-card {
            background: white;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        .activity-card h3 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-sub);
            margin-bottom: 16px;
        }

        .debug-card {
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            border-radius: 16px;
            padding: 16px;
        }

        .debug-card .line {
            color: #1e3a8a;
            font-size: 13px;
            line-height: 1.5;
            margin-bottom: 8px;
            word-break: break-word;
        }

        .debug-card .line:last-child {
            margin-bottom: 0;
        }

        .msg-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg-item {
            padding: 12px;
            background: #f9fafb;
            border-radius: 12px;
            border-left: 4px solid var(--primary);
            transition: transform 0.2s;
        }

        .msg-item:hover {
            transform: translateX(4px);
        }

        .msg-item.is-reply {
            background: #f0fdf4;
            border-left-color: #22c55e;
        }

        .msg-item .psid {
            font-size: 11px;
            font-family: monospace;
            color: var(--primary);
            cursor: pointer;
            text-decoration: underline;
            font-weight: 600;
        }

        .msg-item.is-reply .psid {
            color: #15803d;
            text-decoration: none;
            cursor: default;
        }

        .msg-item .text {
            font-size: 13px;
            margin-top: 4px;
            color: #374151;
        }

        .msg-item .meta {
            color: #6b7280;
            font-size: 11px;
            margin-top: 6px;
        }

        .result-box {
            margin-top: 24px;
            padding: 16px;
            border-radius: 12px;
            display: none;
        }

        .thread-tools {
            border-top: 1px solid #e5e7eb;
            margin-top: 28px;
            padding-top: 24px;
        }

        .tool-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 16px;
        }

        .btn-tool {
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            border-radius: 12px;
            color: #1d4ed8;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            padding: 12px 16px;
        }

        .btn-tool:hover {
            background: #dbeafe;
        }

        .result-success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #bbfcce;
            font-size: 14px;
        }

        .result-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
            font-size: 14px;
        }

    </style>
</head>

<body>
    <div class="navbar">
        <div class="logo">nanovate.io</div>
        <div class="page-badge">Connected: {{ page_name }}{% if page_id %} ({{ page_id }}){% endif %}</div>
    </div>

    <main>
        <div class="container">
            <div class="card">
                <h2>Live Send Action</h2>
                <p class="desc">Send a manual response to a customer on Facebook Messenger.</p>

                <form id="sendForm">
                    <input type="hidden" id="page_id" name="page_id" value="{{ page_id }}">
                    <div class="form-group">
                        <label for="recipient_id">Recipient PSID</label>
                        <input type="text" id="recipient_id" name="recipient_id" placeholder="Copy PSID from the feed"
                            required>
                    </div>
                    <div class="form-group">
                        <label for="message">Message Response</label>
                        <textarea id="message" name="message" rows="4" placeholder="Type your message here..."
                            required></textarea>
                    </div>
                    <button type="submit" class="btn-send" id="btn-submit">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                        </svg>
                        Send Message Now
                    </button>
                </form>

                <div id="result" class="result-box"></div>
            </div>
        </div>

        <div class="sidebar">
            <div class="activity-card">
                <h3>Connection Debug</h3>
                <div id="debug-box" class="debug-card">
                    <div class="line">Checking current page status...</div>
                </div>
            </div>
            <div class="activity-card">
                <h3>Current Page Events (Live)</h3>
                <div id="msg-feed" class="msg-list">
                    <div
                        style="text-align: center; color: #9ca3af; padding: 20px; border: 1px dashed #e5e7eb; border-radius: 10px; font-size: 13px;">
                        Waiting for page events...</div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const form = document.getElementById('sendForm');
        const btn = document.getElementById('btn-submit');
        const result = document.getElementById('result');
        const feed = document.getElementById('msg-feed');
        const connectedPageId = {{ page_id|tojson }};
        const debugBox = document.getElementById('debug-box');

        function copyPSID(id) { document.getElementById('recipient_id').value = id; }

        async function updateFeed() {
            try {
                const response = await fetch('/api/recent-messages?page_id={{ page_id }}');
                const messages = await response.json();
                if (messages.length === 0) {
                    feed.innerHTML = `
                        <div style="text-align: center; color: #9ca3af; padding: 20px; border: 1px dashed #e5e7eb; border-radius: 10px; font-size: 13px;">
                            No messages yet for ${connectedPageId ? `page ${connectedPageId}` : 'this page'}.
                        </div>
                    `;
                    return;
                }
                feed.innerHTML = messages.map(m => `
                    <div class="msg-item ${m.is_reply ? 'is-reply' : ''}">
                        <div class="psid" ${m.is_reply ? '' : `onclick="copyPSID('${m.sender_id}')" title="Click to copy PSID"`}>
                            ${m.is_reply ? (m.sender_id || 'MANUAL_REPLY') : `PSID: ${m.sender_id}`}
                        </div>
                        <div class="text">"${m.text}"</div>
                        <div class="meta">${m.source || 'messenger_webhook'}${m.asset_type ? ` | ${m.asset_type}` : ''}${m.asset_id ? ` | ${m.asset_id}` : ''}</div>
                    </div>
                `).join('');
            } catch (err) { console.error(err); }
        }

        async function updateDebug() {
            try {
                const response = await fetch('/api/debug/{{ page_id }}');
                const data = await response.json();
                debugBox.innerHTML = `
                    <div class="line"><strong>Page:</strong> ${data.connected_page_name || 'Unknown'}${data.connected_page_id ? ` (${data.connected_page_id})` : ''}</div>
                    <div class="line"><strong>Saved token:</strong> ${data.page_token_exists ? 'Yes' : 'No'}</div>
                    <div class="line"><strong>Subscribed:</strong> ${data.subscribed_fields?.length ? 'Yes' : 'Unknown'}</div>
                    <div class="line"><strong>Fields:</strong> ${data.subscribed_fields?.length ? data.subscribed_fields.join(', ') : 'None reported'}</div>
                    <div class="line"><strong>Total events saved:</strong> ${data.message_count}</div>
                    <div class="line"><strong>Current page events saved:</strong> ${data.page_message_count}</div>
                    <div class="line"><strong>Last webhook page:</strong> ${data.last_entry_id || 'None yet'}</div>
                    <div class="line"><strong>Matches this page:</strong> ${data.last_hit_matches_connected_page ? 'Yes' : 'No'}</div>
                    <div class="line"><strong>Last object:</strong> ${data.last_object_type || 'None yet'}</div>
                    <div class="line"><strong>Page webhook seen:</strong> ${data.page_has_webhook_hit ? 'Yes' : 'No'}</div>
                    <div class="line"><strong>Page last webhook time:</strong> ${data.page_last_webhook_timestamp ? new Date(data.page_last_webhook_timestamp * 1000).toLocaleString() : 'None yet'}</div>
                    <div class="line"><strong>Page last webhook endpoint:</strong> ${data.page_last_webhook_endpoint || 'None yet'}</div>
                    <div class="line"><strong>Warning:</strong> ${data.warning || 'None'}</div>
                    <div class="line"><strong>Subscription error:</strong> ${data.subscription_error || 'None'}</div>
                `;
            } catch (err) {
                debugBox.innerHTML = `<div class="line"><strong>Debug error:</strong> ${err.message}</div>`;
            }
        }

        function showResult(success, message) {
            result.style.display = 'block';
            result.className = `result-box ${success ? 'result-success' : 'result-error'}`;
            result.innerHTML = message;
        }

        setInterval(updateFeed, 3000);

        document.addEventListener('DOMContentLoaded', function() {
            fetch('/api/debug/{{ page_id }}')
                .then(r => r.json())
                .then(data => {
                    debugBox.innerHTML = `
                        <div class="line"><strong>Page:</strong> ${data.connected_page_name || 'Unknown'}${data.connected_page_id ? ` (${data.connected_page_id})` : ''}</div>
                        <div class="line"><strong>Saved token:</strong> ${data.page_token_exists ? 'Yes' : 'No'}</div>
                        <div class="line"><strong>Subscribed:</strong> ${data.subscribed_fields?.length ? 'Yes' : 'Unknown'}</div>
                        <div class="line"><strong>Fields:</strong> ${data.subscribed_fields?.length ? data.subscribed_fields.join(', ') : 'None reported'}</div>
                        <div class="line"><strong>Total events saved:</strong> ${data.message_count}</div>
                        <div class="line"><strong>Current page events saved:</strong> ${data.page_message_count}</div>
                        <div class="line"><strong>Last webhook page:</strong> ${data.last_entry_id || 'None yet'}</div>
                        <div class="line"><strong>Matches this page:</strong> ${data.last_hit_matches_connected_page ? 'Yes' : 'No'}</div>
                        <div class="line"><strong>Last object:</strong> ${data.last_object_type || 'None yet'}</div>
                        <div class="line"><strong>Subscription error:</strong> ${data.error || 'None'}</div>
                    `;
                })
                .catch(err => {
                    debugBox.innerHTML = `<div class="line"><strong>Debug error:</strong> ${err.message}</div>`;
                });

            updateFeed();
        });

        form.onsubmit = async (e) => {
            e.preventDefault();
            btn.disabled = true;
            btn.innerHTML = 'Sending...';
            const formData = new FormData(form);
            formData.set('page_id', connectedPageId || '');
            try {
                const response = await fetch('/send-message', { method: 'POST', body: formData });
                const data = await response.json();
                if (data.success) {
                    showResult(true, `<strong>Success!</strong> Message ID: ${data.result.message_id}`);
                } else {
                    const msg = data.error?.error?.message || JSON.stringify(data.error);
                    showResult(false, `<strong>Error:</strong> ${msg}`);
                }
            } catch (err) {
                showResult(false, `<strong>Error:</strong> ${err.message}`);
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Send Message Now';
            }
        }
    </script>
</body>

</html>
